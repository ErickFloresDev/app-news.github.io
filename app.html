<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreNews</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;700;900&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        // --- PREVENCIÓN DE ERRORES EN CONSOLA ---
        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'IMG') {
                e.preventDefault(); // Evita que el error de imagen rota sature la consola
            }
        }, true);

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#40a6ff',
                        'brand-soft': '#e6f3ff',
                    },
                    fontFamily: {
                        mulish: ['Mulish', 'sans-serif'],
                        nunito: ['Nunito', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #fcfdfe; color: #1a1c1e; font-family: 'Nunito', sans-serif; }
        .material-card { background: white; border-radius: 5px; border: 1px solid #e1e3e8; transition: all 0.2s ease; cursor: pointer; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-pop { animation: pop 0.2s ease-out; }
        .header-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; }
        @keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const proxyImage = (url) => {
            if (!url) return null;
            return `https://images.weserv.nl/?url=${encodeURIComponent(url)}&default=1`;
        };

        const SafeImage = ({ src, className, alt }) => {
            const [imgState, setImgState] = useState('loading');
            const proxiedSrc = proxyImage(src);

            useEffect(() => {
                if (!proxiedSrc) { setImgState('error'); return; }
                const img = new Image();
                img.src = proxiedSrc;
                img.onload = () => setImgState('success');
                img.onerror = () => setImgState('error');
            }, [proxiedSrc]);

            // Si hay error o no hay fuente, mostramos el SVG de galería
            if (imgState === 'error') {
                return (
                    <div className={`${className} bg-gray-100 flex items-center justify-center`}>
                        <svg className="w-12 h-12 text-gray-400 animate-pop" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                            <circle cx="8.5" cy="8.5" r="1.5" />
                            <polyline points="21 15 16 10 5 21" />
                        </svg>
                    </div>
                );
            }
            
            if (imgState === 'loading') { /* tu skeleton */ }

            return <img src={proxiedSrc} alt={alt} className={`${className} animate-pop`} />;
        };

        const ErrorState = () => (
            <div className="flex flex-col items-center justify-center py-20 text-center animate-pop">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#e0e0e0" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className="h-36 w-36 icon icon-tabler icons-tabler-outline icon-tabler-alert-circle"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0" /><path d="M12 8v4" /><path d="M12 16h.01" /></svg>
                <h3 className="text-xl font-black text-gray-400 uppercase tracking-tighter">Sin conexión o límite excedido</h3>
                <p className="text-gray-400 text-sm mt-2">Estamos teniendo problemas para traer las noticias. Inténtalo más tarde.</p>
            </div>
        );

        const AccordionItem = ({ title, items, onSelect }) => {
            const [isExpanded, setIsExpanded] = useState(false);
            return (
                <div className="border-b border-gray-100 last:border-0">
                    <button 
                        onClick={(e) => { e.preventDefault(); setIsExpanded(!isExpanded); }}
                        className="w-full flex justify-between items-center py-3 px-1 text-[11px] font-black font-mulish text-gray-500 uppercase tracking-widest hover:text-brand"
                    >
                        {title}
                        <span className={`transition-transform duration-300 ${isExpanded ? 'rotate-180' : ''}`}>
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#a8a8a8" className="icon icon-tabler icons-tabler-filled icon-tabler-chevron-down"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M18.707 8.293a1 1 0 0 1 0 1.414l-6 6a1 1 0 0 1 -1.414 0l-6 -6a1 1 0 0 1 1.414 -1.414l5.293 5.293l5.293 -5.293a1 1 0 0 1 1.414 0" /></svg>
                        </span>
                    </button>
                    {isExpanded && (
                        <div className="flex flex-wrap gap-2 pb-4 pt-1 animate-pop">
                            {items.map(item => (
                                <button 
                                    key={item}
                                    onClick={() => onSelect(item)}
                                    className="px-3 py-1.5 rounded-xl bg-brand-soft text-brand text-xs font-black hover:bg-brand hover:text-white transition-all"
                                >
                                    {item}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const CustomDropdown = ({ label, value, options, onChange }) => {
            const [open, setOpen] = useState(false);
            return (
                <div className="relative">
                    <button onClick={() => setOpen(!open)} className="px-4 py-2 gap-2 bg-white border border-gray-200 rounded-2xl flex items-center w-full">
                        <span className="text-xs font-black text-brand ">{label}</span>
                        <span className="text-xs font-bold text-gray-700 ">{options.find(o => o.value === value)?.label}</span>
                    </button>
                    {open && (
                        <div className="absolute top-full mt-2 w-full bg-white border border-gray-100 rounded-2xl shadow-sm z-50 overflow-hidden">
                            {options.map(o => (
                                <button key={o.value} onClick={() => { onChange(o.value); setOpen(false); }} className="w-full text-left px-4 py-2 text-xs font-bold hover:bg-brand-soft hover:text-brand">
                                    {o.label}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [articles, setArticles] = useState([]);
            const [selected, setSelected] = useState(null);
            const [search, setSearch] = useState('');
            const [showSearchBox, setShowSearchBox] = useState(false);
            const [lang, setLang] = useState('es');
            const [sort, setSort] = useState('publishedAt');
            const [quickSearchData, setQuickSearchData] = useState({});
            const [error, setError] = useState(false);
            const searchRef = useRef(null);

            //paginador
            const [page, setPage] = useState(1);
            const [totalArticles, setTotalArticles] = useState(0);
            const ARTICLES_PER_PAGE = 10;

            const openArticle = (art) => {
                setSelected(art);
                window.scrollTo(0, 0);
                window.history.pushState({ article: true }, '');
            };

            useEffect(() => {
                const handlePopState = () => {
                    setSelected(null);
                    window.scrollTo(0, 0);
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            useEffect(() => {
                const loadQuickData = async () => {
                    try {
                        const response = await fetch('quickSearchData.json');
                        const data = await response.json();
                        setQuickSearchData(data);
                    } catch (e) {}
                };
                loadQuickData();
            }, []);

            const timeAgo = (dateStr) => {
                const diff = Math.floor((new Date() - new Date(dateStr)) / 1000);
                if (diff < 60) return 'Hace un momento';
                if (diff < 3600) return `Hace ${Math.floor(diff / 60)} min`;
                if (diff < 86400) return `Hace ${Math.floor(diff / 3600)} h`;
                if (diff < 2592000) return `Hace ${Math.floor(diff / 86400)} días`;
                return `Hace ${Math.floor(diff / 2592000)} meses`;
            };

            const formatDate = (dateStr) => {
                return new Date(dateStr).toLocaleDateString('es-ES', { 
                    day: 'numeric', month: 'long', year: 'numeric' 
                });
            };

            const formatDateShort = (dateStr) => {
                return new Date(dateStr).toLocaleDateString('es-ES', { 
                    day: 'numeric', month: 'numeric', year: 'numeric' 
                });
            };

            const fetchNews = async (currentPage = 1) => {
                try {
                    const defaultQuery = lang === 'es' ? 'noticias' : 'news';
                    const endpoint = `/.netlify/functions/news?q=${encodeURIComponent(search || defaultQuery)}&lang=${lang}&sortby=${sort}&max=${ARTICLES_PER_PAGE}&page=${currentPage}`;
                    const res = await fetch(endpoint);
                    if (!res.ok) throw new Error(res.status);
                    const data = await res.json();
                    if (data.error) throw new Error(data.error);
                    setError(false);
                    if (data.articles) setArticles(data.articles);
                    if (data.totalArticles) setTotalArticles(data.totalArticles);
                } catch (e) {
                    setError(true);
                    setArticles([]);
                }
            };

            useEffect(() => { 
                setPage(1); 
                fetchNews(1); 
            }, [search, lang, sort]);

            return (
                <div className="min-h-screen pb-20">
                    {/* 2. MODIFICADO: Clases del Header simplificadas para que sea SIEMPRE fijo y visible */}
                    <header className={`bg-white/90 backdrop-blur-md fixed top-0 left-0 right-0 z-[100] border-b border-gray-100 px-4 py-3 transition-all duration-300 
                        ${selected ? '-translate-y-full opacity-0 pointer-events-none' : 'translate-y-0 opacity-100'}`}>
                        
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row gap-4 items-center">
                            <span 
                                onClick={() => { setSelected(null); setSearch(''); window.scrollTo(0,0); }} 
                                className="text-xl font-black font-mulish text-brand cursor-pointer"
                            >
                                CORE<span className="text-gray-800">NEWS</span>
                            </span>
                            <div className="relative flex-1 w-full" ref={searchRef}>
                                <button
                                    className="w-full bg-gray-100 rounded-2xl px-5 py-2 text-sm font-bold border-2 border-transparent hover:border-gray-200 hover:bg-white transition-all outline-none font-nunito text-left flex items-center justify-between"
                                    onClick={() => setShowSearchBox(!showSearchBox)}
                                >
                                    <span className="text-gray-500">{search || 'Seleccionar categoría...'}</span>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" 
                                        fill="#a8a8a8" 
                                        className={`transition-transform duration-300 ${showSearchBox ? 'rotate-180' : ''}`}>
                                        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                                        <path d="M18.707 8.293a1 1 0 0 1 0 1.414l-6 6a1 1 0 0 1 -1.414 0l-6 -6a1 1 0 0 1 1.414 -1.414l5.293 5.293l5.293 -5.293a1 1 0 0 1 1.414 0" />
                                    </svg>
                                </button>

                                {showSearchBox && (
                                    <div className="absolute top-full left-0 w-full mt-2 bg-white border border-gray-100 rounded-[24px] shadow-2xl p-5 z-[110] animate-pop overflow-y-auto">
                                        <div className="flex justify-between items-center mb-4">
                                            <span className="text-xs font-black text-gray-500 uppercase tracking-widest">Explorador Rápido</span>
                                            <button onClick={() => setShowSearchBox(false)} className="text-brand font-bold text-xs uppercase">Cerrar</button>
                                        </div>
                                        {Object.entries(quickSearchData).map(([cat, items]) => (
                                            <AccordionItem key={cat} title={cat} items={items} onSelect={(val) => { setSearch(val); setShowSearchBox(false); }} />
                                        ))}
                                    </div>
                                )}
                            </div>
                            <div className="flex gap-2 w-full md:w-auto">
                                <CustomDropdown label="Idioma" value={lang} onChange={setLang} options={[{label:'Español', value:'es'}, {label:'Inglés', value:'en'}]} />
                                <CustomDropdown label="Orden" value={sort} onChange={setSort} options={[{label:'Reciente', value:'publishedAt'}, {label:'Relevancia', value:'relevancy'}]} />
                            </div>
                        </div>
                    </header>

                    <main className={`max-w-5xl mx-auto px-4 transition-all duration-500 ${selected ? 'mt-10' : 'mt-48 md:mt-24'}`}>
                        {error ? (
                            <ErrorState />
                        ) : selected ? (
                            <article className="max-w-2xl mx-auto animate-pop pb-10">
                                    <button onClick={() => {setSelected(null); window.scrollTo(0,0);}} className="text-gray-600 font-bold text-sm uppercase mb-8 flex items-center gap-2 hover:translate-x-[-4px] transition-transform">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#615460" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className="icon icon-tabler icons-tabler-outline icon-tabler-arrow-narrow-left"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 12l14 0" /><path d="M5 12l4 4" /><path d="M5 12l4 -4" /></svg>
                                        Volver al feed
                                    </button>
                                
                                <SafeImage src={selected.image} className="w-full h-72 md:h-96 object-cover rounded-md mb-4 shadow-sm" alt={selected.title} />
                                
                                <div className="flex justify-between mb-6">
                                    <div className="flex items-center mt-auto text-sm font-bold text-gray-400 uppercase tracking-tighter">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a8a8a8" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className="icon icon-tabler icons-tabler-outline icon-tabler-world mr-1"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0" /><path d="M3.6 9h16.8" /><path d="M3.6 15h16.8" /><path d="M11.5 3a17 17 0 0 0 0 18" /><path d="M12.5 3a17 17 0 0 1 0 18" /></svg>
                                        {selected.source.name}
                                    </div>

                                    <div className="flex items-center mt-auto text-sm font-bold text-gray-400 uppercase tracking-tighter">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a8a8a8" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className="icon icon-tabler icons-tabler-outline icon-tabler-calendar-week mr-1"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 7a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12" /><path d="M16 3v4" /><path d="M8 3v4" /><path d="M4 11h16" /><path d="M7 14h.013" /><path d="M10.01 14h.005" /><path d="M13.01 14h.005" /><path d="M16.015 14h.005" /><path d="M13.015 17h.005" /><path d="M7.01 17h.005" /><path d="M10.01 17h.005" /></svg>
                                        {new Date(selected.publishedAt).toLocaleDateString()}
                                    </div>
                                </div>
                                
                                <h2 className="text-xl font-black font-mulish mb-6 leading-tight text-gray-900">{selected.title}</h2>
                                <p className="text-gray-600 leading-relaxed mb-10 text-lg font-nunito">{selected.description || selected.content}</p>

                                <div className="flex items-center justify-center mt-auto text-sm font-semibold text-gray-600 uppercase tracking-tighter">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#625561" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className="icon icon-tabler icons-tabler-outline icon-tabler-world mr-1"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0" /><path d="M3.6 9h16.8" /><path d="M3.6 15h16.8" /><path d="M11.5 3a17 17 0 0 0 0 18" /><path d="M12.5 3a17 17 0 0 1 0 18" /></svg>
                                    <a href={selected.url} target="_blank" className="">Leer artículo completo en su web</a>    
                                </div>
                                
                            </article>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 gap-6">
                                {articles.map((art, i) => (
                                    <div
                                        key={i}
                                        onClick={() => openArticle(art)}
                                        className="material-card shadow-sm flex overflow-hidden group h-40"
                                        >
                                        {/* Imagen izquierda */}
                                        <div className="w-36 md:w-40 h-full overflow-hidden bg-gray-100 flex-shrink-0">
                                            <SafeImage
                                            src={art.image}
                                            className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                                            alt={art.title}
                                            />
                                        </div>

                                        {/* Contenido derecha */}
                                        <div className="p-4 flex flex-col flex-1">
                                            <span className="flex items-center text-[13px] font-black mb-2 tracking-tighter text-gray-400">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a8a8a8" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className="icon icon-tabler icons-tabler-outline icon-tabler-world mr-1"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0" /><path d="M3.6 9h16.8" /><path d="M3.6 15h16.8" /><path d="M11.5 3a17 17 0 0 0 0 18" /><path d="M12.5 3a17 17 0 0 1 0 18" /></svg>
                                            {art.source.name}
                                            </span>

                                            <h3 className="text-[13px] font-bold leading-snug mb-2 line-clamp-4 md:line-clamp-3 font-mulish  text-gray-900">
                                            {art.title}
                                            </h3>
                                            
                                            <div className="flex items-center justify-between mt-auto">
                                                <div className="flex items-center text-xs font-bold text-gray-400 uppercase tracking-tighter">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a8a8a8" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className="mr-1"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 7a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12" /><path d="M16 3v4" /><path d="M8 3v4" /><path d="M4 11h16" /></svg>
                                                    {/* Solo números en móvil: 17/3/2026 */}
                                                    <span className="block md:hidden">{formatDateShort(art.publishedAt)}</span>
                                                    {/* Texto completo en desktop: 17 de marzo de 2026 */}
                                                    <span className="hidden md:block">{formatDate(art.publishedAt)}</span>
                                                </div>
                                                <span className="text-xs font-bold text-brand whitespace-nowrap ml-2">
                                                    {timeAgo(art.publishedAt)}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                        {/* Paginador */}
                        {!error && !selected && totalArticles > ARTICLES_PER_PAGE && (
                            <div className="flex flex-col items-center gap-3 mt-10 md:flex-row md:justify-center md:gap-4">
                                {/* Texto arriba en móvil, en medio en desktop */}
                                <span className="text-xs font-black text-gray-500 uppercase tracking-widest whitespace-nowrap order-first md:order-none">
                                    Página <span>{page}</span> de {Math.min(Math.ceil(totalArticles / ARTICLES_PER_PAGE), 100)}
                                </span>

                                {/* Botones abajo en móvil, a los lados en desktop */}
                                <div className="flex gap-4 md:contents">
                                    <button
                                        onClick={() => { const prev = page - 1; setPage(prev); fetchNews(prev); window.scrollTo(0, 0); }}
                                        disabled={page === 1}
                                        className="flex items-center px-5 py-2 rounded-md bg-white border border-gray-200 text-xs font-black text-gray-500 uppercase tracking-widest hover:border-brand hover:text-brand transition-all disabled:opacity-30 disabled:cursor-not-allowed md:order-first"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#a8a8a8" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className="mr-2"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M15 6l-6 6l6 6" /></svg>
                                        Anterior
                                    </button>

                                    <button
                                        onClick={() => { const next = page + 1; setPage(next); fetchNews(next); window.scrollTo(0, 0); }}
                                        disabled={page >= Math.min(Math.ceil(totalArticles / ARTICLES_PER_PAGE), 100)}
                                        className="flex items-center px-5 py-2 rounded-md bg-white border border-gray-200 text-xs font-black text-gray-500 uppercase tracking-widest hover:border-brand hover:text-brand transition-all disabled:opacity-30 disabled:cursor-not-allowed"
                                    >
                                        Siguiente
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#a8a8a8" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className="ml-2"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M9 6l6 6l-6 6" /></svg>
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
