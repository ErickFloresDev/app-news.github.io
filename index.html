<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreNews</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;700;900&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- DESPUÉS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        // --- PREVENCIÓN DE ERRORES EN CONSOLA ---
        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'IMG') {
                e.preventDefault(); // Evita que el error de imagen rota sature la consola
            }
        }, true);

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#40a6ff',
                        'brand-soft': '#e6f3ff',
                    },
                    fontFamily: {
                        mulish: ['Mulish', 'sans-serif'],
                        nunito: ['Nunito', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {background-image: url('https://images.unsplash.com/photo-1476242906366-d8eb64c2f661?w=1200&q=50');background-size: cover;background-position: center;background-attachment: fixed;color: #1a1c1e;font-family: 'Nunito', sans-serif;}
        body::before { content: ''; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.60); /* más oscuro para compensar sin blur */ z-index: 0; }
        #root { position: relative; z-index: 1; }
        .material-card { background: white; border-radius: 5px; border: 1px solid #e1e3e8; transition: all 0.2s ease; cursor: pointer; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-pop { animation: pop 0.2s ease-out; }
        .header-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; }
        .card-news { will-change: transform; }
        @keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const proxyImage = (url) => {
            if (!url) return null;
            return `https://images.weserv.nl/?url=${encodeURIComponent(url)}&default=1&n=-1&w=400&q=70`;
        };

        const SafeImage = ({ src, className, alt }) => {
            const [imgState, setImgState] = useState('loading');
            const proxiedSrc = proxyImage(src);

            useEffect(() => {
                if (!proxiedSrc) { setImgState('error'); return; }
                const img = new Image();
                img.src = proxiedSrc;
                img.onload = () => setImgState('success');
                img.onerror = () => setImgState('error');
            }, [proxiedSrc]);

            // Si hay error o no hay fuente, mostramos el SVG de galería
            if (imgState === 'error') {
                return (
                    <div className={`${className} bg-gray-100 flex items-center justify-center`}>
                        <svg className="w-12 h-12 text-gray-400 animate-pop" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                            <circle cx="8.5" cy="8.5" r="1.5" />
                            <polyline points="21 15 16 10 5 21" />
                        </svg>
                    </div>
                );
            }
            
            if (imgState === 'loading') { 
                return <div className={`${className} bg-white/10 animate-pulse`} />;
             }

            return <img src={proxiedSrc} alt={alt}  loading="lazy"  className={`${className} animate-pop`} />;
        };

        const ErrorState = () => (
            <div className="flex flex-col items-center justify-center py-20 text-center animate-pop">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#e0e0e0" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className="h-36 w-36 icon icon-tabler icons-tabler-outline icon-tabler-alert-circle"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0" /><path d="M12 8v4" /><path d="M12 16h.01" /></svg>
                <h3 className="text-xl font-black text-gray-400 uppercase tracking-tighter">Sin conexión o límite excedido</h3>
                <p className="text-gray-400 text-sm mt-2">Estamos teniendo problemas para traer las noticias. Inténtalo más tarde.</p>
            </div>
        );

        const AccordionItem = ({ title, items, onSelect }) => {
            const [isExpanded, setIsExpanded] = useState(false);
            return (
                <div className="border-b border-gray-100 last:border-0">
                    <button 
                        onClick={(e) => { e.preventDefault(); setIsExpanded(!isExpanded); }}
                        className="w-full flex justify-between items-center py-3 px-1 text-[11px] font-black font-mulish text-gray-500 uppercase tracking-widest hover:text-brand"
                    >
                        {title}
                        <span className={`transition-transform duration-300 ${isExpanded ? 'rotate-180' : ''}`}>
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#a8a8a8" className="icon icon-tabler icons-tabler-filled icon-tabler-chevron-down"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M18.707 8.293a1 1 0 0 1 0 1.414l-6 6a1 1 0 0 1 -1.414 0l-6 -6a1 1 0 0 1 1.414 -1.414l5.293 5.293l5.293 -5.293a1 1 0 0 1 1.414 0" /></svg>
                        </span>
                    </button>
                    {isExpanded && (
                        <div className="flex flex-wrap gap-2 pb-4 pt-1 animate-pop">
                            {items.map(item => (
                                <button 
                                    key={item}
                                    onClick={() => onSelect(item)}
                                    className="px-3 py-1.5 rounded-xl bg-brand-soft text-brand text-xs font-black hover:bg-brand hover:text-white transition-all"
                                >
                                    {item}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const SortDropdown = ({ value, onChange }) => {
            const [open, setOpen] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const handleClick = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
                document.addEventListener('mousedown', handleClick);
                return () => document.removeEventListener('mousedown', handleClick);
            }, []);

            return (
                <div className="relative" ref={ref}>
                    <button
                        onClick={() => setOpen(!open)}
                        className="flex items-center justify-center w-8 h-8 rounded-full bg-gray-100 hover:bg-brand-soft hover:text-brand transition-all text-gray-500"
                    >
                        <i className="fa-solid fa-ellipsis-vertical text-sm"></i>
                    </button>
                    {open && (
                        <div className="absolute right-0 top-full mt-2 bg-white border border-gray-100 rounded-2xl shadow-xl z-50 overflow-hidden min-w-[140px]">
                            <div className="px-4 py-2 text-xs font-black text-gray-400 uppercase tracking-widest border-b border-gray-50">Ordenar por</div>
                            {[{label: 'Más reciente', value: 'publishedAt'}, {label: 'Relevancia', value: 'relevancy'}].map(o => (
                                <button
                                    key={o.value}
                                    onClick={() => { onChange(o.value); setOpen(false); }}
                                    className={`w-full text-left px-4 py-2.5 text-sm font-bold transition-all flex items-center gap-2
                                        ${value === o.value ? 'text-brand bg-brand-soft' : 'hover:bg-brand-soft hover:text-brand text-gray-600'}`}
                                >
                                    {value === o.value && <i className="fa-solid fa-check text-[10px]"></i>}
                                    {o.label}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [articles, setArticles] = useState([]);
            const [selected, setSelected] = useState(null);
            const [search, setSearch] = useState('');
            const [showSearchBox, setShowSearchBox] = useState(false);
            const [lang, setLang] = useState('es');
            const [sort, setSort] = useState('publishedAt');
            const [quickSearchData, setQuickSearchData] = useState({});
            const [error, setError] = useState(false);
            const searchRef = useRef(null);
            const scrollPositionRef = useRef(0);

            //paginador
            const [page, setPage] = useState(1);
            const [totalArticles, setTotalArticles] = useState(0);
            const ARTICLES_PER_PAGE = 10;

            const [activeTab, setActiveTab] = useState('Categorías');
            const [category, setCategory] = useState('general');
            const [country, setCountry] = useState('');
            

            const openArticle = (art) => {
                scrollPositionRef.current = window.scrollY;
                setSelected(art);
                window.scrollTo(0, 0);
                window.history.pushState({ article: true }, '');
            };


            const shouldRestoreScroll = useRef(false);

            // Reemplaza el useEffect del popstate por esto:
            useEffect(() => {
                const handlePopState = () => {
                    shouldRestoreScroll.current = true;
                    setSelected(null);
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            // Agrega este useLayoutEffect nuevo:
            React.useLayoutEffect(() => {
                if (!selected && shouldRestoreScroll.current) {
                    window.scrollTo(0, scrollPositionRef.current);
                    shouldRestoreScroll.current = false;
                }
            }, [selected]);

            useEffect(() => {
                const loadQuickData = async () => {
                    try {
                        const response = await fetch('quickSearchData.json');
                        const data = await response.json();
                        setQuickSearchData(data);
                    } catch (e) {}
                };
                loadQuickData();
            }, []);

            const publishedTime = (dateStr) => {
                if (!dateStr) return '';
                return new Date(dateStr).toLocaleTimeString('es-PE', {
                    hour: '2-digit',
                    minute: '2-digit',
                    timeZone: 'America/Lima'
                });
            };

            const formatDate = (dateStr) => {
                return new Date(dateStr).toLocaleDateString('es-ES', { 
                    day: 'numeric', month: 'long', year: 'numeric' 
                });
            };

            const formatDateShort = (dateStr) => {
                return new Date(dateStr).toLocaleDateString('es-ES', { 
                    day: 'numeric', month: 'numeric', year: 'numeric' 
                });
            };

            const fetchNews = async (currentPage = 1) => {
                try {
                    let endpoint;
                    if (activeTab === 'Categorías') {
                        endpoint = `/.netlify/functions/news?category=${category}&lang=${lang}&max=${ARTICLES_PER_PAGE}&page=${currentPage}`;
                    } else if (activeTab === 'País') {
                        endpoint = `/.netlify/functions/news?category=${category}&country=${country}&lang=${lang}&max=${ARTICLES_PER_PAGE}&page=${currentPage}`;
                    } else {
                        const q = search || (lang === 'es' ? 'noticias' : 'news');
                        endpoint = `/.netlify/functions/news?q=${encodeURIComponent(q)}&lang=${lang}&sortby=${sort}&max=${ARTICLES_PER_PAGE}&page=${currentPage}`;
                    }
                    const res = await fetch(endpoint);
                    if (!res.ok) throw new Error(res.status);
                    const data = await res.json();
                    if (data.error) throw new Error(data.error);
                    setError(false);
                    if (data.articles) setArticles(data.articles);
                    if (data.totalArticles) setTotalArticles(data.totalArticles);
                } catch (e) {
                    setError(true);
                    setArticles([]);
                }
            };

            useEffect(() => {
                setPage(1);
                fetchNews(1);
            }, [search, lang, sort, category, country]);

            return (
                <div className="min-h-screen pb-20">
                    {/* 2. MODIFICADO: Clases del Header simplificadas para que sea SIEMPRE fijo y visible */}
                   <header className={`backdrop-blur-xl bg-white/[0.06] border-b border-white/[0.15] fixed top-0 left-0 right-0 z-[100] px-4 py-3 transition-all duration-300
                        ${selected ? '-translate-y-full opacity-0 pointer-events-none' : 'translate-y-0 opacity-100'}`}>
                        
                        <div className="max-w-7xl mx-auto flex flex-col gap-2">
                            <div className="flex items-center justify-between gap-3">
                                <span
                                    onClick={() => { setSelected(null); setSearch(''); setCategory('general'); setCountry(''); setActiveTab('Categorías'); window.scrollTo(0,0); }}
                                    className="text-2xl font-black font-mulish text-brand cursor-pointer whitespace-nowrap"
                                >
                                    CORE<span className="text-gray-100">NEWS</span>
                                </span>
                                <SortDropdown value={sort} onChange={setSort} />
                            </div>
                            
                            {/* Fila 1: Logo + tabs principales + sort */}
                            <div className="flex items-center gap-3 mt-1">
                                <div className="flex gap-1.5 overflow-x-auto no-scrollbar flex-1 py-1">
                                    {Object.keys(quickSearchData).map((tab) => (
                                        <button
                                            key={tab}
                                            onClick={() => setActiveTab(tab)}
                                            className={`px-3 py-1.5 rounded-2xl text-sm font-black whitespace-nowrap transition-all border
                                                ${activeTab === tab
                                                    ? 'bg-brand text-white border-brand'
                                                    : 'bg-white/[0.08] text-white border-white/20 hover:border-white/40 hover:text-white/90'}`}
                                        >
                                            <i className={quickSearchData[tab].icon + ' text-sm mr-1'}></i>
                                            <span className="">{tab}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Fila 2: Sub-badges de la tab activa */}
                            {quickSearchData[activeTab] && (
                                <div className="flex gap-2 overflow-x-auto no-scrollbar pb-0.5 mt-2">
                                    {Object.entries(quickSearchData[activeTab].items).map(([label, value]) => {
                                        const isActive =
                                            (activeTab === 'Idioma' && lang === value) ||
                                            (activeTab === 'País' && country === value) ||
                                            (activeTab === 'Categorías' && category === value) ||
                                            (activeTab === 'Temas' && search === value);
                                        return (
                                            <button
                                                key={value}
                                                onClick={() => {
                                                    if (activeTab === 'Idioma') { setLang(value); }
                                                    else if (activeTab === 'País') { setCountry(value); setSearch(''); }
                                                    else if (activeTab === 'Categorías') { setCategory(value); setSearch(''); }
                                                    else { setSearch(value); setCountry(''); }
                                                    setPage(1);
                                                    window.scrollTo(0, 0);
                                                }}
                                                className={`px-3 py-1.5 rounded-2xl text-sm font-black whitespace-nowrap transition-all border
                                                    ${isActive
                                                        ? 'bg-brand text-white border-brand'
                                                        : 'bg-white text-gray-600 border-gray-200 hover:border-brand hover:text-brand'}`}
                                            >
                                                {label}
                                            </button>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    </header>

                    <main className={`max-w-5xl mx-auto px-4 transition-[margin] duration-500 ${selected ? 'mt-10' : 'mt-48'}`}>
                        {error ? (
                            <ErrorState />
                        ) : selected ? (
                            <article className="max-w-2xl mx-auto animate-pop pb-10">
                                    <button onClick={() => {setSelected(null); setTimeout(() => window.scrollTo(0, scrollPositionRef.current), 0); }} className="text-gray-100 font-bold text-sm uppercase mb-8 flex items-center gap-2 hover:translate-x-[-4px] transition-transform">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className="icon icon-tabler icons-tabler-outline icon-tabler-arrow-narrow-left"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 12l14 0" /><path d="M5 12l4 4" /><path d="M5 12l4 -4" /></svg>
                                        Volver al feed
                                    </button>
                                
                                <SafeImage src={selected.image} className="w-full h-72 md:h-96 object-cover rounded-md mb-4 shadow-sm" alt={selected.title} />
                                
                                <div className="flex justify-between mb-6">
                                    <div className="flex items-center mt-auto text-sm font-bold text-gray-300 uppercase tracking-tighter">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a8a8a8" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className="icon icon-tabler icons-tabler-outline icon-tabler-world mr-1"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0" /><path d="M3.6 9h16.8" /><path d="M3.6 15h16.8" /><path d="M11.5 3a17 17 0 0 0 0 18" /><path d="M12.5 3a17 17 0 0 1 0 18" /></svg>
                                        {selected.source.name}
                                    </div>

                                    <div className="flex items-center mt-auto text-sm font-bold text-gray-300 uppercase tracking-tighter">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a8a8a8" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className="icon icon-tabler icons-tabler-outline icon-tabler-calendar-week mr-1"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 7a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12" /><path d="M16 3v4" /><path d="M8 3v4" /><path d="M4 11h16" /><path d="M7 14h.013" /><path d="M10.01 14h.005" /><path d="M13.01 14h.005" /><path d="M16.015 14h.005" /><path d="M13.015 17h.005" /><path d="M7.01 17h.005" /><path d="M10.01 17h.005" /></svg>
                                        {new Date(selected.publishedAt).toLocaleDateString()}
                                    </div>
                                </div>
                                
                                <h2 className="text-xl font-black font-mulish mb-6 leading-tight text-gray-200">{selected.title}</h2>
                                <p className="text-gray-100 leading-relaxed mb-10 text-lg font-nunito">{selected.description || selected.content}</p>

                                <div className="flex items-center justify-center mt-auto text-sm font-semibold text-gray-100 uppercase tracking-tighter">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#625561" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className="icon icon-tabler icons-tabler-outline icon-tabler-world mr-1"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0" /><path d="M3.6 9h16.8" /><path d="M3.6 15h16.8" /><path d="M11.5 3a17 17 0 0 0 0 18" /><path d="M12.5 3a17 17 0 0 1 0 18" /></svg>
                                    <a href={selected.url} target="_blank" className="">Leer artículo completo en su web</a>    
                                </div>
                                
                            </article>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 gap-4">
                                {articles.map((art, i) => (
                                    <div
                                        key={i}
                                        onClick={() => openArticle(art)}
                                        className="card-news group relative flex overflow-hidden rounded-2xl cursor-pointer
                                        backdrop-blur-xl bg-white/[0.08] border border-white/[0.22]
                                        shadow-[0_8px_32px_rgba(0,0,0,0.18),inset_0_1px_0_rgba(255,255,255,0.15)]
                                        transition-all duration-300 ease-[cubic-bezier(.23,1,.32,1)]
                                        md:hover:-translate-y-1 hover:scale-[1.012]
                                        md:hover:shadow-[0_16px_48px_rgba(0,0,0,0.25),inset_0_1px_0_rgba(255,255,255,0.2)]
                                        h-[130px]"
                                    >
                                        {/* IMAGEN lateral — ancho fijo siempre horizontal */}
                                        <div className="relative w-[130px] h-full shrink-0 overflow-hidden">
                                            <SafeImage
                                                src={art.image}
                                                className="w-full h-full object-cover brightness-75 saturate-[0.85]
                                                        transition-all duration-500
                                                        group-hover:brightness-90 group-hover:saturate-100 group-hover:scale-105"
                                                alt={art.title}
                                            />
                                            {/* fade lateral hacia el contenido */}
                                            <div className="absolute inset-0 bg-gradient-to-r from-transparent via-transparent to-black/40 pointer-events-none" />
                                        </div>

                                        {/* CONTENIDO */}
                                        <div className="flex flex-col justify-between gap-2 px-4 py-4 flex-1 min-w-0">

                                            {/* Fuente */}
                                            <div className="flex items-center gap-2">
                                                <div className="w-1.5 h-1.5 rounded-full bg-white/60 shrink-0" />
                                                <span className="text-[9px] tracking-[2px] font-semibold uppercase text-white/70 truncate">
                                                    {art.source.name}
                                                </span>
                                                <div className="flex-1 h-px bg-white/15" />
                                            </div>

                                            <h3 className="text-[13px] font-bold leading-[1.45] text-white/90 line-clamp-2 overflow-hidden font-mulish flex-1 min-h-0">
                                                {art.title}
                                            </h3>

                                            {/* Footer */}
                                            <div className="flex items-center justify-between pt-2.5 border-t border-white/[0.12]">
                                                <div className="flex items-center gap-1 text-[11px] text-white/70">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                                                        <path d="M4 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7z"/><path d="M16 3v4M8 3v4M4 11h16"/>
                                                    </svg>
                                                    <span className="block sm:hidden">{formatDateShort(art.publishedAt)}</span>
                                                    <span className="hidden sm:block">{formatDate(art.publishedAt)}</span>
                                                </div>
                                                <div className="w-px h-3 bg-white/15 mx-1" />
                                                <span className="text-[11px] font-semibold text-white/70 whitespace-nowrap">
                                                    {publishedTime(art.publishedAt)}
                                                </span>
                                            </div>

                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                        {/* Paginador */}
                        {!error && !selected && totalArticles > ARTICLES_PER_PAGE && (
                            <div className="flex flex-col items-center gap-3 mt-10 md:flex-row md:justify-center md:gap-4">
                                {/* Texto arriba en móvil, en medio en desktop */}
                                <span className="text-xs font-black text-gray-200 uppercase tracking-widest whitespace-nowrap order-first md:order-none">
                                    Página <span>{page}</span> de {Math.min(Math.ceil(totalArticles / ARTICLES_PER_PAGE), 100)}
                                </span>

                                {/* Botones abajo en móvil, a los lados en desktop */}
                                <div className="flex gap-4 md:contents">
                                    <button
                                        onClick={() => { const prev = page - 1; setPage(prev); fetchNews(prev); window.scrollTo(0, 0); }}
                                        disabled={page === 1}
                                        className="flex items-center px-5 py-2 rounded-md backdrop-blur-xl bg-white/[0.06] rounded-2xl border border-gray-200 text-xs font-black text-gray-100 uppercase tracking-widest hover:border-brand hover:text-brand transition-all disabled:opacity-30 disabled:cursor-not-allowed md:order-first"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#a8a8a8" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className="mr-2"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M15 6l-6 6l6 6" /></svg>
                                        Anterior
                                    </button>

                                    <button
                                        onClick={() => { const next = page + 1; setPage(next); fetchNews(next); window.scrollTo(0, 0); }}
                                        disabled={page >= Math.min(Math.ceil(totalArticles / ARTICLES_PER_PAGE), 100)}
                                        className="flex items-center px-5 py-2 rounded-md backdrop-blur-xl bg-white/[0.06] rounded-2xl border border-gray-200 text-xs font-black text-gray-100 uppercase tracking-widest hover:border-brand hover:text-brand transition-all disabled:opacity-30 disabled:cursor-not-allowed"
                                    >
                                        Siguiente
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#a8a8a8" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className="ml-2"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M9 6l6 6l-6 6" /></svg>
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
